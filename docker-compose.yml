version: '3.8'

services:
  # PostgreSQL Database with pg_cron extension
  postgres:
    image: postgres:16-alpine
    container_name: dashboard-grafana-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-grafana_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grafana_password}
      POSTGRES_DB: ${DB_NAME:-grafana_dashboard}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-pg-cron.sh:/docker-entrypoint-initdb.d/init-pg-cron.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-grafana_user} -d ${DB_NAME:-grafana_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-network
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=${DB_NAME:-grafana_dashboard}"
      - "-c"
      - "cron.use_background_workers=on"
      - "-c"
      - "cron.timezone=Asia/Jakarta"

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dashboard-grafana-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-grafana_user}
      - DB_PASSWORD=${DB_PASSWORD:-grafana_password}
      - DB_NAME=${DB_NAME:-grafana_dashboard}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
    networks:
      - dashboard-network

volumes:
  postgres_data:
    driver: local

networks:
  dashboard-network:
    driver: bridge
