version: '3.8'

services:
  # PostgreSQL Database with pg_cron extension (development)
  postgres:
    image: postgres:16-alpine
    container_name: dashboard-grafana-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-grafana_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grafana_password}
      POSTGRES_DB: ${DB_NAME:-grafana_dashboard}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./scripts/init-pg-cron.sh:/docker-entrypoint-initdb.d/init-pg-cron.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-grafana_user} -d ${DB_NAME:-grafana_dashboard}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-network-dev
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_cron"
      - "-c"
      - "cron.database_name=${DB_NAME:-grafana_dashboard}"
      - "-c"
      - "cron.use_background_workers=on"
      - "-c"
      - "cron.timezone=Asia/Jakarta"

volumes:
  postgres_data_dev:
    driver: local

networks:
  dashboard-network-dev:
    driver: bridge
